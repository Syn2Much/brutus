name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Build static
        run: make clean && make static

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: brutus
          path: brutus
